name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install pandas plotly pytest

      - name: Run ETL tests
        run: pytest tests/ -v

      - name: Run the pipeline end-to-end
        run: python src/climate_etl.py

      - name: Build the dashboard
        run: python src/build_dashboard.py
